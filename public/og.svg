  <text x="90" y="520" font-size="34" fill="#2a1b3d" font-family="Arial, sans-serif">Résumés • Cover Letters • LinkedIn — by Nicole</text>
  <text x="90" y="580" font-size="26" fill="#db2777" font-family="Arial, sans-serif" font-weight="700">75+ transformed · 95% interview rate · 24-hour turnaround</text>
</svg>
