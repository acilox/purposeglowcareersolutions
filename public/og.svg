  <text x="90" y="150" font-size="26" letter-spacing="6" fill="#7c3aed" font-family="Arial, sans-serif" font-weight="700">PURPOSE &amp; GLOW CAREER SOLUTIONS</text>
  <text x="86" y="310" font-size="104" font-weight="700" fill="#4c1d6b">Your résumé,</text>
